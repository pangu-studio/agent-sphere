name: Build Base Image

# Builds the static-deps base image (ffmpeg / x264 / opus / libyuv / curl /
# openssl all compiled static against bullseye's glibc 2.31) and pushes it
# to GHCR as ghcr.io/pangu-studio/agentsphere-build:bullseye-<arch>. Both release.yml and
# pr-check.yml just `docker pull` this image and run cmake against the
# bind-mounted source tree, which keeps PR builds short and avoids
# recompiling ffmpeg on every commit.
#
# Trigger:
#   - push to main that touches packaging/build-base/** (rebuilds + pushes)
#   - manual workflow_dispatch (for re-pushing after a registry hiccup)
#
# Image tags written:
#   bullseye-amd64 / bullseye-arm64    -> the rolling tag used by downstream jobs
#   bullseye-<sha7>-<arch>             -> immutable tag for one-off pinning
#   jammy-amd64 / jammy-arm64          -> legacy alias kept for one release
#                                          cycle so old branches/tags can
#                                          still pull a working image. Drop
#                                          after the next tagged release.

on:
    push:
        branches: [main]
        paths:
            - 'packaging/build-base/**'
            - '.github/workflows/build-base.yml'
    workflow_dispatch:

permissions:
    contents: read
    packages: write

jobs:
    build-and-push:
        name: Build base (${{ matrix.arch }})
        strategy:
            fail-fast: false
            matrix:
                include:
                    - { runner: ubuntu-22.04, arch: amd64 }
                    - { runner: ubuntu-22.04-arm, arch: arm64 }
        runs-on: ${{ matrix.runner }}
        steps:
            - name: Checkout
              uses: actions/checkout@v4

            - name: Compute short sha
              id: meta
              run: echo "sha7=$(echo "${GITHUB_SHA}" | cut -c1-7)" >> "$GITHUB_OUTPUT"

            - name: Set up Docker buildx
              uses: docker/setup-buildx-action@v3

            - name: Login to GHCR
              uses: docker/login-action@v3
              with:
                  registry: ghcr.io
                  username: ${{ github.actor }}
                  password: ${{ secrets.GITHUB_TOKEN }}

            - name: Build and push
              uses: docker/build-push-action@v5
              with:
                  context: packaging/build-base
                  file: packaging/build-base/Dockerfile.bullseye
                  push: true
                  # Push the new bullseye-* tags AND the legacy jammy-* aliases
                  # (pointing at the same image) so PRs / release branches still
                  # cut against ghcr.io/pangu-studio/agentsphere-build:jammy-<arch> keep working
                  # while we migrate. Drop the jammy aliases after the next
                  # tagged release once every active branch is on bullseye-*.
                  tags: |
                      ghcr.io/pangu-studio/agentsphere-build:bullseye-${{ matrix.arch }}
                      ghcr.io/pangu-studio/agentsphere-build:bullseye-${{ steps.meta.outputs.sha7 }}-${{ matrix.arch }}
                      ghcr.io/pangu-studio/agentsphere-build:jammy-${{ matrix.arch }}
                      ghcr.io/pangu-studio/agentsphere-build:jammy-${{ steps.meta.outputs.sha7 }}-${{ matrix.arch }}
                  cache-from: type=gha,scope=build-base-${{ matrix.arch }}
                  cache-to: type=gha,scope=build-base-${{ matrix.arch }},mode=max
