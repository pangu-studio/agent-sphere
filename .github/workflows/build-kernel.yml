name: Build Kernel

on:
    workflow_dispatch:
        inputs:
            arch:
                description: 'Architectures to build'
                required: true
                type: choice
                options:
                    - both
                    - x86_64
                    - arm64
                default: both
            upload_to_oss:
                description: 'Upload kernel to OSS after build'
                required: true
                type: boolean
                default: true
            update_images_json:
                description: 'Update images.json after build'
                required: true
                type: boolean
                default: true

jobs:
    build-x86_64:
        if: inputs.arch == 'both' || inputs.arch == 'x86_64'
        runs-on: ubuntu-latest
        name: 'kernel (x86_64)'
        timeout-minutes: 15
        steps:
            - uses: actions/checkout@v4

            - name: Build
              run: ./scripts/docker/build.sh x86_64 kernel

            - name: Find output
              id: find
              run: |
                  FILE="build/share/vmlinuz"
                  if [ ! -f "$FILE" ]; then
                    echo "vmlinuz not found in build/share/"
                    exit 1
                  fi
                  echo "path=$FILE" >> "$GITHUB_OUTPUT"
                  echo "name=$(basename "$FILE")" >> "$GITHUB_OUTPUT"
                  SHA256=$(sha256sum "$FILE" | cut -d' ' -f1)
                  echo "sha256=$SHA256" >> "$GITHUB_OUTPUT"
                  echo "size=$(stat -c%s "$FILE")" >> "$GITHUB_OUTPUT"
                  echo "Found: $FILE ($(du -h "$FILE" | cut -f1), sha256: $SHA256)"

            - name: Upload to OSS
              if: inputs.upload_to_oss
              env:
                  OSS_REGION: ${{ secrets.OSS_REGION }}
                  OSS_ACCESS_KEY_ID: ${{ secrets.OSS_ACCESS_KEY_ID }}
                  OSS_ACCESS_KEY_SECRET: ${{ secrets.OSS_ACCESS_KEY_SECRET }}
                  OSS_BUCKET_NAME: ${{ secrets.OSS_BUCKET_NAME }}
                  OSS_PUBLIC_URL: https://ass.lxy.app
                  OSS_AGENTSPHERE_IMAGES_DIR: tenbox/images
              run: |
                  pip install oss2 alibabacloud_cdn20180510
                  python3 scripts/ci/upload_to_oss.py \
                    "${{ steps.find.outputs.path }}" \
                    kernel \
                    x86_64

            - name: Save build metadata
              if: inputs.update_images_json
              run: |
                  mkdir -p /tmp/meta
                  cat > /tmp/meta/x86_64.json <<EOF
                  {
                    "arch": "x86_64",
                    "filename": "${{ steps.find.outputs.name }}",
                    "sha256": "${{ steps.find.outputs.sha256 }}",
                    "size": ${{ steps.find.outputs.size }}
                  }
                  EOF

            - name: Upload build metadata
              if: inputs.update_images_json
              uses: actions/upload-artifact@v4
              with:
                  name: meta-kernel-x86_64
                  path: /tmp/meta/x86_64.json
                  retention-days: 1

    build-arm64:
        if: inputs.arch == 'both' || inputs.arch == 'arm64'
        runs-on: ubuntu-24.04-arm
        name: 'kernel (arm64)'
        timeout-minutes: 15
        steps:
            - uses: actions/checkout@v4

            - name: Build
              run: ./scripts/docker/build.sh arm64 kernel

            - name: Find output
              id: find
              run: |
                  FILE="build/share/Image-arm64"
                  if [ ! -f "$FILE" ]; then
                    echo "Image-arm64 not found in build/share/"
                    exit 1
                  fi
                  echo "path=$FILE" >> "$GITHUB_OUTPUT"
                  echo "name=$(basename "$FILE")" >> "$GITHUB_OUTPUT"
                  SHA256=$(sha256sum "$FILE" | cut -d' ' -f1)
                  echo "sha256=$SHA256" >> "$GITHUB_OUTPUT"
                  echo "size=$(stat -c%s "$FILE")" >> "$GITHUB_OUTPUT"
                  echo "Found: $FILE ($(du -h "$FILE" | cut -f1), sha256: $SHA256)"

            - name: Upload to OSS
              if: inputs.upload_to_oss
              env:
                  OSS_REGION: ${{ secrets.OSS_REGION }}
                  OSS_ACCESS_KEY_ID: ${{ secrets.OSS_ACCESS_KEY_ID }}
                  OSS_ACCESS_KEY_SECRET: ${{ secrets.OSS_ACCESS_KEY_SECRET }}
                  OSS_BUCKET_NAME: ${{ secrets.OSS_BUCKET_NAME }}
                  OSS_PUBLIC_URL: https://ass.lxy.app
                  OSS_AGENTSPHERE_IMAGES_DIR: tenbox/images
              run: |
                  pip install oss2 alibabacloud_cdn20180510
                  python3 scripts/ci/upload_to_oss.py \
                    "${{ steps.find.outputs.path }}" \
                    kernel \
                    arm64

            - name: Save build metadata
              if: inputs.update_images_json
              run: |
                  mkdir -p /tmp/meta
                  cat > /tmp/meta/arm64.json <<EOF
                  {
                    "arch": "arm64",
                    "filename": "${{ steps.find.outputs.name }}",
                    "sha256": "${{ steps.find.outputs.sha256 }}",
                    "size": ${{ steps.find.outputs.size }}
                  }
                  EOF

            - name: Upload build metadata
              if: inputs.update_images_json
              uses: actions/upload-artifact@v4
              with:
                  name: meta-kernel-arm64
                  path: /tmp/meta/arm64.json
                  retention-days: 1

    update-images-json:
        if: >-
            always()
            && inputs.update_images_json
            && (needs.build-x86_64.result == 'success' || needs.build-arm64.result == 'success')
        needs: [build-x86_64, build-arm64]
        runs-on: ubuntu-latest
        name: 'Update images.json'
        permissions:
            contents: write
            pull-requests: write
        steps:
            - uses: actions/checkout@v4

            - name: Download all metadata
              uses: actions/download-artifact@v4
              with:
                  pattern: meta-kernel-*
                  path: /tmp/meta
                  merge-multiple: true

            - name: List metadata
              run: ls -la /tmp/meta/ && cat /tmp/meta/*.json

            # Default: sha256 left empty so clients skip verification (OSS can update before PR merges).
            # Add --enable-sha256 to the script call if you want checksums in the manifest.
            - name: Update images.json
              env:
                  OSS_PUBLIC_URL: https://ass.lxy.app
                  OSS_AGENTSPHERE_IMAGES_DIR: tenbox/images
              run: |
                  python3 scripts/ci/update_images_json.py \
                    --target kernel \
                    --meta-dir /tmp/meta

            - name: Create branch, commit and open PR
              env:
                  GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
              run: |
                  git config user.name "github-actions[bot]"
                  git config user.email "github-actions[bot]@users.noreply.github.com"
                  git add website/public/api/images.json
                  git diff --cached --quiet && echo "No changes to commit" && exit 0
                  BRANCH="ci/update-kernel-$(date +%Y%m%d-%H%M%S)"
                  git checkout -b "$BRANCH"
                  git commit -m "ci: update kernel"
                  git push -u origin "$BRANCH"
                  gh pr create --title "ci: update kernel" --body "Auto-generated by Build Kernel workflow." --base main
