name: PR Check

on:
    pull_request:
        branches: [main]

permissions:
    contents: read
    packages: read

jobs:
    build-windows:
        name: Build C++ Project (windows-latest)
        if: >-
            github.event_name == 'pull_request'
        runs-on: windows-latest
        steps:
            - uses: actions/checkout@v4

            - name: Check src changes
              id: changes
              uses: dorny/paths-filter@v3
              with:
                  filters: |
                      src:
                        - 'src/**'
                        - 'CMakeLists.txt'
                        - 'tests/**'

            - name: Configure CMake
              if: steps.changes.outputs.src == 'true'
              run: cmake -B build -A x64 -DCMAKE_BUILD_TYPE=Release

            - name: Build
              if: steps.changes.outputs.src == 'true'
              run: cmake --build build --config Release --parallel

            - name: Upload build artifacts
              if: steps.changes.outputs.src == 'true'
              uses: actions/upload-artifact@v4
              with:
                  name: tenbox-build-windows
                  path: build/Release/*.exe

            - name: Skip notice
              if: steps.changes.outputs.src != 'true'
              run: echo "No changes in src/, skipping C++ build."

    build-macos-arm64:
        name: Build macOS App (arm64)
        if: >-
            github.event_name == 'pull_request'
        runs-on: macos-latest
        steps:
            - uses: actions/checkout@v4

            - name: Check src changes
              id: changes
              uses: dorny/paths-filter@v3
              with:
                  filters: |
                      src:
                        - 'src/**'
                        - 'CMakeLists.txt'
                        - 'tests/**'

            - name: Build C++ runtime (arm64)
              if: steps.changes.outputs.src == 'true'
              run: |
                cmake -B build/cmake-arm64 -DCMAKE_BUILD_TYPE=Release -DCMAKE_OSX_ARCHITECTURES=arm64
                cmake --build build/cmake-arm64 --target agentsphere-vm-runtime --parallel

            - name: Build Swift manager (arm64)
              if: steps.changes.outputs.src == 'true'
              run: |
                swift build -c release --arch arm64 --scratch-path "${{ github.workspace }}/build/spm-arm64"
              working-directory: src/manager-macos

            - name: Upload build artifacts
              if: steps.changes.outputs.src == 'true'
              uses: actions/upload-artifact@v4
              with:
                  name: agentsphere-macos-arm64
                  path: |
                    build/cmake-arm64/agentsphere-vm-runtime
                    build/spm-arm64/arm64-apple-macosx/release/AgentSphereManager

            - name: Skip notice
              if: steps.changes.outputs.src != 'true'
              run: echo "No changes in src/, skipping macOS arm64 build."

    build-macos-x86_64:
        name: Build macOS App (x86_64)
        if: >-
            github.event_name == 'pull_request'
        runs-on: macos-latest
        steps:
            - uses: actions/checkout@v4

            - name: Check src changes
              id: changes
              uses: dorny/paths-filter@v3
              with:
                  filters: |
                      src:
                        - 'src/**'
                        - 'CMakeLists.txt'
                        - 'tests/**'

            - name: Build C++ runtime (x86_64)
              if: steps.changes.outputs.src == 'true'
              run: |
                cmake -B build/cmake-x86_64 -DCMAKE_BUILD_TYPE=Release -DCMAKE_OSX_ARCHITECTURES=x86_64
                cmake --build build/cmake-x86_64 --target agentsphere-vm-runtime --parallel

            - name: Build Swift manager (x86_64)
              if: steps.changes.outputs.src == 'true'
              run: |
                swift build -c release --arch x86_64 --scratch-path "${{ github.workspace }}/build/spm-x86_64"
              working-directory: src/manager-macos

            - name: Upload build artifacts
              if: steps.changes.outputs.src == 'true'
              uses: actions/upload-artifact@v4
              with:
                  name: agentsphere-macos-x86_64
                  path: |
                    build/cmake-x86_64/agentsphere-vm-runtime
                    build/spm-x86_64/x86_64-apple-macosx/release/AgentSphereManager

            - name: Skip notice
              if: steps.changes.outputs.src != 'true'
              run: echo "No changes in src/, skipping macOS x86_64 build."

    build-website:
        name: Build Website
        if: >-
            github.event_name == 'pull_request'
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v4

            - name: Check website changes
              id: changes
              uses: dorny/paths-filter@v3
              with:
                  filters: |
                      website:
                        - 'website/**'

            - uses: actions/setup-node@v4
              if: steps.changes.outputs.website == 'true'
              with:
                  node-version: 20
                  cache: npm
                  cache-dependency-path: website/package-lock.json

            - name: Install website dependencies
              if: steps.changes.outputs.website == 'true'
              run: npm ci
              working-directory: website

            - name: Build website
              if: steps.changes.outputs.website == 'true'
              run: npm run build
              working-directory: website

            - name: Skip notice
              if: steps.changes.outputs.website != 'true'
              run: echo "No changes in website/, skipping website build."
