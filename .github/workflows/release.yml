name: Release Build

# Cuts an amd64 + arm64 .deb on every `vX.Y.Z` tag push and uploads them
# to the matching GitHub Release. This is the head of the linux update
# pipeline: the tenbox-cloud sync timer pulls these debs into the apt
# repo, the console then offers in-browser upgrades to all paired hosts.
#
# IMPORTANT: the runners are pinned to ubuntu-22.04 / ubuntu-22.04-arm,
# NOT ubuntu-latest. The static build base image is debian:11 ("bullseye",
# glibc 2.31) and the binary's effective glibc floor is whatever the build
# container bundles. The runner OS itself doesn't matter for symbol
# resolution because cmake runs *inside* the bullseye container, but we
# still pin the runner so docker-buildx's emulation needs are predictable.
# Do not "modernize" the runner without also bumping the supported matrix
# everywhere else (release notes, install-linux.sh preflight,
# releases.json, console).

on:
    push:
        tags: ['v*']
    workflow_dispatch:
        inputs:
            tag:
                description: 'Tag to build (e.g. v0.7.6). Must match VERSION.'
                required: true

permissions:
    contents: write

jobs:
    build-deb:
        name: Build .deb (${{ matrix.arch }})
        strategy:
            fail-fast: false
            matrix:
                include:
                    - { runner: ubuntu-22.04, arch: amd64 }
                    - { runner: ubuntu-22.04-arm, arch: arm64 }
        runs-on: ${{ matrix.runner }}
        steps:
            - name: Checkout
              uses: actions/checkout@v4

            - name: Resolve tag and validate VERSION
              id: ver
              run: |
                  set -euo pipefail
                  if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
                      tag="${{ inputs.tag }}"
                  else
                      tag="${GITHUB_REF_NAME}"
                  fi
                  version="$(cat VERSION | head -n1 | tr -d '[:space:]')"
                  if [ "v${version}" != "${tag}" ]; then
                      echo "::error ::tag ${tag} does not match VERSION (${version})."
                      echo "       update VERSION before tagging."
                      exit 1
                  fi
                  echo "tag=${tag}"          >> "$GITHUB_OUTPUT"
                  echo "version=${version}"  >> "$GITHUB_OUTPUT"

            - name: Login to GHCR
              uses: docker/login-action@v3
              with:
                  registry: ghcr.io
                  username: ${{ github.actor }}
                  password: ${{ secrets.GITHUB_TOKEN }}

            # The base image is produced by .github/workflows/build-base.yml on
            # any push to packaging/build-base/**. Pulling it here keeps the
            # release run short and guarantees release & PR builds use the
            # exact same toolchain. If the image is missing (e.g. first run
            # after wiping the registry), fall back to a local build so the
            # release isn't blocked.
            - name: Pull static-deps base image
              id: pull_base
              continue-on-error: true
              run: docker pull ghcr.io/78/tenbox-build:bullseye-${{ matrix.arch }}

            - name: Set up Docker buildx (fallback)
              if: steps.pull_base.outcome == 'failure'
              uses: docker/setup-buildx-action@v3

            - name: Build static-deps base image (fallback)
              if: steps.pull_base.outcome == 'failure'
              uses: docker/build-push-action@v5
              with:
                  context: packaging/build-base
                  file: packaging/build-base/Dockerfile.bullseye
                  tags: ghcr.io/78/tenbox-build:bullseye-${{ matrix.arch }}
                  load: true
                  cache-from: type=gha,scope=build-base-${{ matrix.arch }}
                  cache-to: type=gha,scope=build-base-${{ matrix.arch }},mode=max

            - name: Compile agentsphere (static)
              run: |
                  set -euo pipefail
                  docker run --rm \
                      -v "${{ github.workspace }}:/src" \
                      -w /src \
                      ghcr.io/78/tenbox-build:bullseye-${{ matrix.arch }} \
                      bash -lc '
                          set -euo pipefail
                          # Keep -O3 for runtime, but add -g so we can split debuginfo
                          # into sibling .debug files before stripping. The .deb still
                          # ships stripped binaries; the .debug files are uploaded as
                          # a separate artifact so any future coredump can be
                          # symbolised offline by matching BuildID.
                          cmake -B build -G Ninja \
                              -DCMAKE_BUILD_TYPE=Release \
                              -DCMAKE_C_FLAGS_RELEASE="-O3 -g -DNDEBUG" \
                              -DCMAKE_CXX_FLAGS_RELEASE="-O3 -g -DNDEBUG" \
                              -DAGENTSPHERE_STATIC_FFMPEG=ON \
                              -DAGENTSPHERE_STATIC_RUNTIME=ON
                          cmake --build build --parallel
                          cd build
                          for bin in agentsphere agentsphered agentsphere-vm-runtime; do
                              objcopy --only-keep-debug "$bin" "$bin.debug"
                              strip --strip-debug --strip-unneeded "$bin"
                              # debuglink stores only basename, so cwd=build keeps the
                              # embedded reference clean (agentsphered -> agentsphered.debug).
                              objcopy --add-gnu-debuglink="$bin.debug" "$bin"
                              chmod 0644 "$bin.debug"
                          done
                      '

            - name: Build .deb
              run: |
                  packaging/debian/build-deb.sh \
                      "${{ matrix.arch }}" \
                      "${{ steps.ver.outputs.version }}"

            - name: Stage debuginfo tarball
              run: |
                  set -euo pipefail
                  mkdir -p dist
                  out="dist/agentsphere_${{ steps.ver.outputs.version }}_${{ matrix.arch }}-dbgsym.tar.zst"
                  tar --zstd -cf "$out" -C build \
                      agentsphere.debug agentsphered.debug agentsphere-vm-runtime.debug
                  ( cd dist && sha256sum "$(basename "$out")" > "$(basename "$out").sha256" )

            # Sanity-check the deb against Bullseye's dpkg (1.20). The runner
            # is Ubuntu 22.04 with dpkg 1.21+, which can read both xz and zstd
            # archives, so a deb that secretly slipped to zstd would still
            # parse fine on the runner but blow up on a Debian 11 host with
            # "unknown compression for member control.tar.zst". Running the
            # validation inside debian:11 catches that regression here, not
            # in users' install logs.
            - name: Validate deb is installable on Bullseye
              run: |
                  set -euo pipefail
                  deb="dist/agentsphere_${{ steps.ver.outputs.version }}_${{ matrix.arch }}.deb"
                  docker run --rm --platform "linux/${{ matrix.arch }}" \
                      -v "${{ github.workspace }}:/src" \
                      -w /src \
                      debian:11-slim \
                      bash -c "set -e; dpkg-deb -I '$deb' >/dev/null && dpkg-deb -c '$deb' >/dev/null"

            - name: Upload artifact
              uses: actions/upload-artifact@v4
              with:
                  name: agentsphere-deb-${{ matrix.arch }}
                  path: |
                      dist/agentsphere_${{ steps.ver.outputs.version }}_${{ matrix.arch }}.deb
                      dist/agentsphere_${{ steps.ver.outputs.version }}_${{ matrix.arch }}.deb.sha256
                      dist/agentsphere_${{ steps.ver.outputs.version }}_${{ matrix.arch }}-dbgsym.tar.zst
                      dist/agentsphere_${{ steps.ver.outputs.version }}_${{ matrix.arch }}-dbgsym.tar.zst.sha256

    publish-release:
        name: Publish GitHub Release
        needs: build-deb
        runs-on: ubuntu-22.04
        steps:
            - name: Checkout
              uses: actions/checkout@v4

            - name: Resolve tag
              id: ver
              run: |
                  set -euo pipefail
                  if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
                      tag="${{ inputs.tag }}"
                  else
                      tag="${GITHUB_REF_NAME}"
                  fi
                  version="${tag#v}"
                  echo "tag=${tag}"         >> "$GITHUB_OUTPUT"
                  echo "version=${version}" >> "$GITHUB_OUTPUT"

            - name: Download deb artifacts
              uses: actions/download-artifact@v4
              with:
                  path: dist
                  pattern: agentsphere-deb-*
                  merge-multiple: true

            # The marketing-site shim at website/public/install.sh fetches
            # install-linux.sh from each Release's download URL, so attach the
            # canonical script here. Updating the installer means cutting a new
            # release - exactly what scripts/install-linux.sh's header documents.
            - name: Stage install-linux.sh
              run: |
                  install -m 0755 scripts/install-linux.sh dist/install-linux.sh

            - name: Publish Release
              uses: softprops/action-gh-release@v2
              with:
                  tag_name: ${{ steps.ver.outputs.tag }}
                  name: AgentSphere ${{ steps.ver.outputs.version }}
                  generate_release_notes: true
                  fail_on_unmatched_files: true
                  files: |
                      dist/agentsphere_${{ steps.ver.outputs.version }}_amd64.deb
                      dist/agentsphere_${{ steps.ver.outputs.version }}_amd64.deb.sha256
                      dist/agentsphere_${{ steps.ver.outputs.version }}_amd64-dbgsym.tar.zst
                      dist/agentsphere_${{ steps.ver.outputs.version }}_amd64-dbgsym.tar.zst.sha256
                      dist/agentsphere_${{ steps.ver.outputs.version }}_arm64.deb
                      dist/agentsphere_${{ steps.ver.outputs.version }}_arm64.deb.sha256
                      dist/agentsphere_${{ steps.ver.outputs.version }}_arm64-dbgsym.tar.zst
                      dist/agentsphere_${{ steps.ver.outputs.version }}_arm64-dbgsym.tar.zst.sha256
                      dist/install-linux.sh
